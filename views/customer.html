<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chill n Fill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6efe5;
      --bg-soft: #efe3d2;
      --bg-deeper: #eadac7;
      --panel: rgba(122, 78, 47, 0.08);
      --panel-strong: rgba(122, 78, 47, 0.16);
      --text: #5e3b24;
      --muted: #b07a53;
      --blue: #b07a53;
      --blue-strong: #7a4e2f;
      --border: rgba(122, 78, 47, 0.2);
      --shadow: 0 12px 30px rgba(94, 59, 36, 0.18);
      --card: #fff7ee;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: "Sarabun", "Segoe UI", "Noto Sans Thai", sans-serif;
      background: linear-gradient(135deg, var(--bg), var(--bg-soft));
      color: var(--text);
      min-height: 100%;
    }

    body {
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 72px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 26px;
      color: #fff7ee;
    }

    .brand {
      font-size: 1.6rem;
      font-weight: 800;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .table-badge {
      border: none;
      background: rgba(255, 255, 255, 0.35);
      color: #fff7ee;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.25);
      color: #fff7ee;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
    }

    .content {
      flex: 1;
      padding: 26px 20px 180px;
    }

    .ordered-section {
      min-height: calc(100vh - 250px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
      margin-bottom: 24px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      color: var(--blue-strong);
    }

    .section-icon {
      font-size: 1.8rem;
    }

    .order-list {
      width: 100%;
      max-width: 1100px;
      min-height: 420px;
      border-radius: 18px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .order-list.empty {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .empty-state {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state p {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .empty-state span {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .order-card {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: var(--shadow);
    }

    .order-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .order-thumb {
      width: 72px;
      height: 72px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    .order-name {
      font-weight: 700;
      font-size: 1rem;
    }

    .order-price {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .order-card-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-box {
      min-width: 32px;
      text-align: center;
      font-weight: 700;
    }

    .qty-btn,
    .remove-btn {
      border: none;
      background: var(--panel);
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 10px;
      cursor: pointer;
    }

    .qty-btn:hover,
    .remove-btn:hover {
      background: var(--panel-strong);
    }

    .bottom-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 12px 12px;
      background: linear-gradient(
        to top,
        rgba(246, 239, 229, 0.98),
        rgba(239, 227, 210, 0.9)
      );
      backdrop-filter: blur(10px);
      box-shadow: 0 -10px 30px rgba(94, 59, 36, 0.12);
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 6px 10px;
    }

    .detail-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue-strong);
    }

    .price-right {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .price-label {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .price-value {
      color: var(--blue-strong);
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }

    .order-btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--blue) 0%, var(--blue-strong) 100%);
      color: #fff7ee;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 20px rgba(94, 59, 36, 0.2);
    }

    .plus-icon {
      font-size: 1.3rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 999;
    }

    .modal.show {
      display: block;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(94, 59, 36, 0.35);
      backdrop-filter: blur(3px);
    }

    .modal-content {
      position: relative;
      width: min(960px, calc(100% - 24px));
      max-height: 85vh;
      overflow: auto;
      margin: 40px auto 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(94, 59, 36, 0.2);
      z-index: 2;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      margin: 0;
      font-size: 1.2rem;
      color: var(--blue-strong);
    }

    .close-btn {
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .modal-body {
      padding: 20px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .menu-card {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 16px;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
      color: var(--text);
      text-align: left;
    }

    .menu-card:hover {
      transform: translateY(-2px);
      background: rgba(176, 122, 83, 0.12);
      border-color: rgba(176, 122, 83, 0.35);
    }

    .menu-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .menu-info {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .menu-info span {
      font-size: 1rem;
      font-weight: 700;
    }

    .menu-info small {
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .menu-grid {
        grid-template-columns: 1fr;
      }

      .section-title h2 {
        font-size: 1.5rem;
      }

      .price-value {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 600px) {
      .topbar {
        padding: 0 14px;
        height: 64px;
      }

      .brand {
        font-size: 1.15rem;
      }

      .content {
        padding: 20px 12px 190px;
      }

      .section-title h2 {
        font-size: 1.2rem;
      }

      .price-value {
        font-size: 1.2rem;
      }

      .order-btn {
        height: 54px;
        font-size: 1rem;
      }

      .order-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .order-card-right {
        width: 100%;
        justify-content: flex-end;
      }

      .order-thumb {
        width: 60px;
        height: 60px;
      }

      .menu-card img {
        height: 150px;
      }

      .modal-content {
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="brand">Chill n Fill</div>

      <div class="topbar-right">
        <button class="table-badge">1</button>

        <button class="icon-btn" aria-label="profile">
          <svg viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 20c1.8-3.5 5-5 8-5s6.2 1.5 8 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="content">
      <section class="ordered-section">
        <div class="section-title">
          <span class="section-icon">🍴</span>
          <h2>Orders</h2>
        </div>

        <div id="orderList" class="order-list empty">
          <div class="empty-state">
            <p>No Order Yet</p>
            <span>Click the Button to order</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Panel -->
    <footer class="bottom-panel">
      <div class="panel-top">
        <div class="detail-left">
          <div class="detail-text">
            <span class="detail-title">Details</span>
          </div>
        </div>

        <div class="price-right">
          <span class="price-label">Price</span>
          <span id="totalPrice" class="price-value">0 Bath</span>
        </div>
      </div>

      <div class="panel-bottom">
        <button id="openModalBtn" class="order-btn">
          <span class="plus-icon"></span>
          <span>Orders</span>
        </button>
      </div>
    </footer>

    <!-- Modal -->
    <div id="menuModal" class="modal">
      <div class="modal-backdrop" id="closeModalBackdrop"></div>

      <div class="modal-content">
        <div class="modal-header">
          <h3>Menu</h3>
          <button id="closeModalBtn" class="close-btn">✕</button>
        </div>

        <div class="modal-body">
          <div class="menu-grid">
            <button class="menu-card" data-name="Fried Chicken" data-price="60">
              <img src="img/chicken.jpg" alt="Fried Chicken">
              <div class="menu-info">
                <span>Fried Chicken </span>
                <small>60 Bath</small>
              </div>
            </button>

            <button class="menu-card" data-name="Fried Rice" data-price="40">
              <img src="img/rice.jpg" alt="Fried Rice">
              <div class="menu-info">
                <span>Fried Rice</span>
                <small>40 Bath</small>
              </div>
            </button>

            <button class="menu-card" data-name="Fried Egg" data-price="35">
              <img src="img/egg.jpg" alt="Fried Egg">
              <div class="menu-info">
                <span>Fried Egg</span>
                <small>35 Bath</small>
              </div>
            </button>

            <button class="menu-card" data-name="Water" data-price="10">
              <img src="img/water.jpg" alt="Water">
              <div class="menu-info">
                <span>Water</span>
                <small>10 Bath</small>
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="JS/customer.js?v=2"></script>
</body>
</html>
