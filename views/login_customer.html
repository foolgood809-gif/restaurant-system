<!DOCTYPE html>
<html lang="th">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="api-base" content="/restaurant-system/api/">
        <title>Customer Login</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap"
            rel="stylesheet">
        <style>
            body {
                font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, var(--chill-cream), var(--chill-cream-deep));
                color: var(--chill-brown);
            }
            :root {
                --chill-cream: #f6efe5;
                --chill-cream-deep: #efe3d2;
                --chill-card: #fff7ee;
                --chill-brown: #7a4e2f;
                --chill-brown-dark: #5e3b24;
                --chill-accent: #b07a53;
                --chill-border: #dcc9b4;
                --chill-input: #fffaf5;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-20px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fadeIn {
                animation: fadeIn 0.3s ease-in;
            }
            .animate-slideDown {
                animation: slideDown 0.3s ease;
            }
            .message {
                padding: 10px 14px;
                border-radius: 8px;
                margin-bottom: 12px;
                font-weight: 500;
                font-size: 14px;
            }
            .message.success {
                background-color: #e8f3df;
                color: #2f5a2f;
                border: 1px solid #b6d3a7;
            }
            .message.error {
                background-color: #f9e2df;
                color: #7a2e2e;
                border: 1px solid #e3b1a8;
            }
            .card {
                background: var(--chill-card);
                border: 1px solid var(--chill-border);
                border-radius: 16px;
            }
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 12px 16px;
                border-radius: 12px;
                font-weight: 600;
                border: 1px solid transparent;
                cursor: pointer;
            }
            .input {
                padding: 12px;
                border-radius: 10px;
                border: 1px solid var(--chill-border);
                background: var(--chill-input);
            }
        </style>
    </head>

    <body class="min-h-screen flex justify-center items-center p-4 bg-gradient-to-br from-[var(--chill-cream)] to-[var(--chill-cream-deep)] text-[var(--chill-brown)]">

        <div class="card bg-[var(--chill-card)] border border-[var(--chill-border)] rounded-2xl p-6 sm:p-10 shadow-2xl max-w-md w-full animate-slideDown">
            <div id="message-container"></div>

            <h2 class="text-[var(--chill-accent)] text-xl font-semibold mb-5 text-center">Customer Login</h2>

            <input type="number" id="table-number" placeholder="Table Number"
                class="input input-bordered w-full bg-[var(--chill-input)] border-[var(--chill-border)] focus:outline-none focus:border-[var(--chill-accent)] mb-4">

            <button id="btn-customer-login" type="button"
                class="btn w-full border-[var(--chill-brown)] bg-[var(--chill-brown)] text-[var(--chill-cream)] hover:bg-[var(--chill-brown-dark)] hover:border-[var(--chill-brown-dark)] mb-2">
                Login
            </button>

            <a href="index.html"
                class="btn w-full border-[var(--chill-border)] bg-[var(--chill-cream-deep)] text-[var(--chill-brown-dark)] hover:bg-[var(--chill-cream)]">
                Back to Menu
            </a>
        </div>

        <script src="JS/script.js?v=2"></script>
    </body>

</html>
