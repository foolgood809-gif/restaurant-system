<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reserve Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --chill-cream: #f6efe5;
        --chill-cream-deep: #efe3d2;
        --chill-card: #fff7ee;
        --chill-brown: #7a4e2f;
        --chill-brown-dark: #5e3b24;
        --chill-accent: #b07a53;
        --chill-border: #dcc9b4;
        --chill-input: #fffaf5;
      }

      body {
        font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, var(--chill-cream), var(--chill-cream-deep));
        color: var(--chill-brown);
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .layout {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      h1 {
        color: var(--chill-brown-dark);
        font-size: 1.8rem;
        font-weight: 700;
        margin: 0;
        line-height: 1.3;
      }

      .tables {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        flex-wrap: nowrap;
        max-width: 100%;
        margin: 0;
      }

      .table-seat {
        width: 84px;
        height: 84px;
        background: var(--chill-brown);
        border-radius: 50%;
        color: var(--chill-cream);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(94, 59, 36, 0.2);
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
      }

      .table-seat.booked {
        background: #b5655a;
        cursor: not-allowed;
        opacity: 0.8;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(94, 59, 36, 0.35);
        backdrop-filter: blur(5px);
      }

      .popup {
        background: var(--chill-card);
        width: min(420px, calc(100% - 32px));
        margin: 120px auto;
        padding: 30px;
        border-radius: 24px;
        border: 1px solid var(--chill-border);
        box-shadow: 0 15px 35px rgba(94, 59, 36, 0.18);
        text-align: center;
        animation: popupFade 0.25s ease;
      }

      @keyframes popupFade {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .popup h3 {
        margin-bottom: 15px;
        font-size: 20px;
        color: var(--chill-brown-dark);
      }

      .popup p {
        line-height: 1.6;
        margin-bottom: 25px;
        font-size: 15px;
        color: var(--chill-brown);
        white-space: pre-line;
      }

      .popup-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
      }

      .confirm-btn {
        background: var(--chill-brown);
        color: var(--chill-cream);
        border: none;
        padding: 10px 28px;
        border-radius: 999px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }

      .confirm-btn:hover {
        background: var(--chill-brown-dark);
      }

      .cancel-btn {
        background: var(--chill-cream-deep);
        color: var(--chill-brown);
        border: 1px solid var(--chill-border);
        padding: 10px 28px;
        border-radius: 999px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }

      .cancel-btn:hover {
        background: var(--chill-cream);
      }

      .popup input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 12px;
        border: 1px solid var(--chill-border);
        background: var(--chill-input);
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <h1>🍽️ You can choose a table.</h1>
      <br>
      <div class="tables">
        <div class="table-seat" data-table="1">1</div>
        <div class="table-seat" data-table="2">2</div>
        <div class="table-seat" data-table="3">3</div>
        <div class="table-seat" data-table="4">4</div>
        <div class="table-seat" data-table="5">5</div>
        <div class="table-seat" data-table="6">6</div>
      </div>
    </div>

    <!-- booking popup -->
    <div class="modal" id="bookingModal">
      <div class="popup">
        <h3>Reserve Table <span id="tableNum"></span></h3>

        <input type="text" id="name" placeholder="Your name" />
        <input type="time" id="time" />

        <div class="popup-buttons">
          <button class="confirm-btn" id="btn-booking-confirm">Confirm</button>
          <button class="cancel-btn" id="btn-booking-cancel">Cancel</button>
        </div>
      </div>
    </div>

    <!-- confirm popup -->
    <div class="modal" id="confirmModal">
      <div class="popup">
        <h3>Confirm Reservation</h3>
        <p id="confirmText"></p>

        <div class="popup-buttons">
          <button class="confirm-btn" id="btn-confirm-yes">Yes</button>
          <button class="cancel-btn" id="btn-confirm-no">No</button>
        </div>
      </div>
    </div>

    <script src="JS/table.js?v=2"></script>
  </body>
</html>
